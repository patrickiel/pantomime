name: Bug report
description: Report something that is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: >
        Include the test YAML and the command you ran, plus the output.
        Redact any secrets and API keys.
      render: shell
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 Pro 23H2
    validations:
      required: true
  - type: input
    id: scaling
    attributes:
      label: Display scaling
      placeholder: e.g. 100%
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
    validations:
      required: false
