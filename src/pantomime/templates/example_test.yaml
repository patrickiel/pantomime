# A Pantomime test is plain natural language. The runner reads each step,
# looks at the screen, and acts. Edit the actions below to match your app.
# The modeline above gives editors (VS Code + the YAML extension) live
# validation and autocomplete. Validate from the CLI with:  panto validate tests
test:
  id: example-smoke
  title: "Example smoke test"
  description: >
    A starting point generated by `panto init`. Replace the steps with actions
    for your own application, then run:  panto run tests
  tags: [smoke]
  priority: high

  # Scope the run to a window whose title contains this text. The CLI
  # --window flag overrides it. Remove this to use the foreground window.
  window: "My App"

  # Test data. Reference values in steps as ${data.name}. Pull public values with
  # ${VAR:NAME} (from the `vars:` map in pantomime.yaml) and secrets with
  # ${SECRET:NAME} (from the `secrets:` map) so neither sits in the test file.
  data:
    user: "${VAR:MY_USER}"
    password: "${SECRET:MY_PASSWORD}"

  preconditions:
    - "The application is open and showing the sign-in screen."

  steps:
    - action: "Type '${data.user}' into the 'Username' field."

    # Deterministic actions (key / type / wait / scroll) skip the model and the
    # screen sense entirely — use them for mechanical steps like a keystroke.
    - key: "Tab"
      expect: "The 'Username' field shows '${data.user}'."

    - action: "Type the password into the 'Password' field."

    - action: "Click the 'Sign in' button."
      expect: "The screen has navigated past the sign-in form."
      timeout_s: 15
      retries: 2

  assertions:
    # A deterministic check: this text must NOT be on screen.
    - "absent:Invalid credentials"
    # A natural-language check, judged against the screen.
    - "A welcome message indicates the user is signed in."

  teardown:
    - "Click 'Sign out' to return to the sign-in screen."
